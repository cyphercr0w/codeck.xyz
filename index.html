    <style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{--bg:#0a0a0b;--bg-card:#111113;--bg-hover:#1a1a1e;--border:#27272a;--text:#fafafa;--text-secondary:#a8a8b3;--text-muted:#8b8b94;--accent:#6366f1;--accent-glow:rgba(99,102,241,0.15);--success:#22c55e;--font:"Inter",-apple-system,sans-serif;--font-mono:"JetBrains Mono","Fira Code",monospace;--max-w:760px}
  body{font-family:var(--font);background:var(--bg);color:var(--text);line-height:1.6;-webkit-font-smoothing:antialiased}
  a{color:var(--accent);text-decoration:none}
  .nav{position:sticky;top:0;z-index:100;background:rgba(10,10,11,0.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--border)}
  .nav-inner{max-width:var(--max-w);margin:0 auto;padding:14px 24px;display:flex;align-items:center;justify-content:space-between}
  .nav-brand{display:flex;align-items:center;gap:10px;text-decoration:none;color:var(--text)}
  .nav-logo{width:28px;height:28px;border-radius:6px;flex-shrink:0}
  .nav-name{font-weight:700;font-size:16px;letter-spacing:-0.02em}
  .nav-links{display:flex;gap:20px}
  .nav-link{color:var(--text-secondary);font-size:13px;font-weight:500;text-decoration:none}
  .hero{max-width:var(--max-w);margin:0 auto;padding:72px 24px 56px;text-align:center}
  .hero-title{font-size:clamp(36px,6vw,52px);font-weight:800;line-height:1.1;letter-spacing:-0.03em;margin-bottom:20px}
  .hero-gradient{background:linear-gradient(135deg,#6366f1,#a78bfa,#ec4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
  .hero-sub{font-size:17px;color:var(--text-secondary);max-width:520px;margin:0 auto 32px;line-height:1.6}
  .hero-meta{font-size:12px;color:var(--text-muted);margin-top:14px}
  .install-wrapper{display:inline-flex;flex-direction:column;max-width:100%}
  .install-tabs{display:flex;justify-content:center;gap:0;margin-bottom:8px}
  .install-tab{padding:5px 14px;border:1px solid var(--border);background:transparent;color:var(--text-muted);font-size:12px;font-weight:500;cursor:pointer;font-family:var(--font)}
  .install-tab:first-child{border-radius:5px 0 0 5px}
  .install-tab:last-child{border-radius:0 5px 5px 0;border-left:none}
  .install-tab.active{background:var(--accent-glow);color:#818cf8;border-color:rgba(99,102,241,0.3)}
  .install-box{display:inline-flex;align-items:center;position:relative;background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:12px 48px 12px 16px;max-width:100%;overflow:hidden}
  .install-cmd{font-family:var(--font-mono);font-size:13px;color:var(--success);white-space:nowrap}
</style>
